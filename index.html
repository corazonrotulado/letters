<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>corazón rotulado</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            font-family: 'Playfair Display', serif; overflow: hidden; 
            background-color: #fce4ec; color: #ad1457;
            transition: background-color 1.2s ease;
        }

        /* TEXTURA */
        body::after {
            content: ""; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
            opacity: 0.1; z-index: 999; pointer-events: none;
        }

        #viewport-texto {
            position: fixed; top: 10vh; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 500px; height: 75vh; z-index: 5;
            display: flex; flex-direction: column; overflow: hidden;
        }

        #contenedor-texto { 
            position: absolute; width: 100%; text-align: left; font-size: 1.4rem; 
            line-height: 2.3; opacity: 0; padding: 20px 25px; pointer-events: none;
            white-space: pre-wrap;
        }

        .bienvenida {
            position: absolute !important; top: 50% !important; transform: translateY(-50%) !important;
            text-align: center !important; opacity: 1 !important; cursor: pointer; pointer-events: auto !important; 
        }

        /* PALABRAS VOLADORAS */
        #contenedor-vuelo {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1000; overflow: hidden; display: none;
        }

        .palabra-voladora {
            position: absolute; white-space: nowrap; font-size: 1.8rem; font-style: italic;
            opacity: 0.9; color: inherit; animation: volar-izq linear forwards;
        }

        @keyframes volar-izq {
            from { transform: translateX(110vw); }
            to { transform: translateX(-150%); }
        }

        #menu-cartas { display: none; flex-direction: column; gap: 5px; padding: 60px 15px; width: 100%; z-index: 20; overflow-y: auto; height: 100%; }
        #menu-cartas::-webkit-scrollbar { display: none; }
        .boton-carta { padding: 18px 0; cursor: pointer; font-size: 1.1rem; text-align: left; border-bottom: 0.5px solid rgba(173, 20, 87, 0.15); opacity: 0.8; }
        
        .zona-click { position: fixed; top: 0; height: 100%; width: 50%; z-index: 10; cursor: pointer; display: none; }
        .izq { left: 0; } .der { right: 0; }
    </style>
</head>
<body>

    <div id="contenedor-vuelo"></div>

    <div id="controles-navegacion">
        <div class="zona-click izq" onclick="regresarAlMenu()"></div>
        <div class="zona-click der" onclick="cambiarCarta(1)"></div>
    </div>

    <div id="viewport-texto">
        <div id="menu-cartas"></div>
        <div id="contenedor-texto" class="bienvenida" onclick="iniciar()">todas mis palabras yacen aquí, <br> ¡sé gentil con ellas, por favor!</div>
    </div>

    <script>
        const S_ID = "1kDWsxPSkUCAYrhr2dUG1gujmiSGo2Crcf36D4TB75js"; 
        let datosCartas = [];
        let indiceActual = -1;
        let animacionActual = null;

        async function cargar() {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${S_ID}/gviz/tq?tqx=out:json`;
                const res = await fetch(url);
                const t = await res.text();
                const json = JSON.parse(t.substr(47).slice(0, -2));
                datosCartas = json.table.rows.map(row => ({
                    texto: row.c[0] ? String(row.c[0].v) : "",
                    titulo: row.c[2] ? String(row.c[2].v) : "Sin título"
                }));
            } catch (e) { console.error("Error de conexión"); }
        }

        function lanzarVuelo(fraseCompleta) {
            const cont = document.getElementById('contenedor-vuelo');
            cont.style.display = 'block';
            cont.innerHTML = '';
            const trozos = fraseCompleta.split('-').map(p => p.trim()).filter(p => p !== "");

            trozos.forEach((palabra, i) => {
                setTimeout(() => {
                    const span = document.createElement('span');
                    span.className = 'palabra-voladora';
                    span.innerText = palabra;
                    span.style.top = (Math.random() * 70 + 10) + "vh";
                    const duracion = Math.random() * 3 + 7;
                    span.style.animationDuration = duracion + "s";
                    cont.appendChild(span);
                    setTimeout(() => span.remove(), duracion * 1000);
                }, i * 1000);
            });
        }

        function cambiarCarta(dir) {
            if (animacionActual) animacionActual.cancel();
            const txtEl = document.getElementById('contenedor-texto');
            const contVuelo = document.getElementById('contenedor-vuelo');
            
            txtEl.style.opacity = 0;
            contVuelo.style.display = 'none';
            contVuelo.innerHTML = '';

            setTimeout(() => {
                indiceActual = (indiceActual + dir + datosCartas.length) % datosCartas.length;
                const carta = datosCartas[indiceActual];
                
                // Normalización de título para detectar "corazón rotulado"
                const tituloLimpio = carta.titulo.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();

                if (tituloLimpio === "corazon rotulado") {
                    txtEl.innerText = ""; 
                    lanzarVuelo(carta.texto);
                } else {
                    txtEl.innerText = carta.texto;
                    txtEl.style.opacity = 1;
                    // Cálculo de duración basado en longitud de texto
                    const dur = ((txtEl.offsetHeight + window.innerHeight) / 50) * 1100;
                    animacionActual = txtEl.animate([
                        { transform: 'translateY(70vh)' }, 
                        { transform: 'translateY(-130%)' }
                    ], { duration: Math.max(dur, 8000), iterations: 1, easing: 'linear' });
                }
            }, 300);
        }

        function iniciar() {
            const m = document.getElementById('menu-cartas');
            const b = document.getElementById('contenedor-texto');
            b.style.display = 'none';
            m.style.display = 'flex';
            m.innerHTML = "";
            datosCartas.forEach((c, i) => {
                const btn = document.createElement('div');
                btn.className = 'boton-carta';
                btn.innerText = c.titulo;
                btn.onclick = () => {
                    indiceActual = i;
                    m.style.display = 'none';
                    document.querySelectorAll('.zona-click').forEach(z => z.style.display = 'block');
                    cambiarCarta(0);
                };
                m.appendChild(btn);
            });
        }

        function regresarAlMenu() { location.reload(); }

        cargar();
    </script>
</body>
</html>
