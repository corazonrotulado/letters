<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>corazón rotulado</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        
        body, html { 
            margin: 0; padding: 0; 
            height: 100%; width: 100%; 
            font-family: 'Playfair Display', serif;
            overflow: hidden; 
            transition: background-color 0.5s ease, color 0.5s ease;
            background-color: #666666;
            color: #d2ff27;
            user-select: none; 
            -webkit-user-select: none;
        }

        /* TEXTURA DE GRANO "STARDUST" */
        body::after {
            content: "";
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
            opacity: 0.25;
            z-index: 999;
            pointer-events: none;
            animation: grain-jump 0.4s steps(4) infinite;
        }

        @keyframes grain-jump {
            0% { transform: translate(0,0); }
            50% { transform: translate(-2%, 1%); }
            100% { transform: translate(1%, -1%); }
        }

        #contenedor-imagen {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90%; height: 90%;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.8s ease, filter 0.8s ease;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            mix-blend-mode: screen; 
        }

        #viewport-texto {
            position: fixed;
            top: 10vh;
            left: 50%;
            transform: translateX(-50%);
            width: 90%; 
            max-width: 500px;
            height: 75vh;
            z-index: 5;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255,255,255,0.1); /* Borde sutil retro */
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
            mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
            scroll-behavior: smooth;
        }

        #viewport-texto::-webkit-scrollbar { display: none; }

        #menu-cartas {
            display: none;
            flex-direction: column;
            gap: 2px;
            padding: 100px 20px;
            width: 100%;
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 20;
        }

        .boton-carta {
            padding: 15px 0;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.2s ease;
            text-align: left;
            border-bottom: 1px dashed rgba(255,255,255,0.1);
        }

        .boton-carta:hover {
            padding-left: 20px;
            letter-spacing: 1px;
            background: rgba(255, 255, 255, 0.05);
        }

        #contenedor-texto { 
            position: absolute;
            width: 100%;
            text-align: left;
            font-size: 1.5rem; 
            line-height: 2.1; 
            opacity: 0;
            padding: 40px 30px;
            color: inherit;
            pointer-events: none;
        }

        .bienvenida {
            position: absolute !important;
            top: 50% !important;
            transform: translateY(-50%) !important;
            text-align: center !important;
            width: 100% !important;
            opacity: 1 !important;
            cursor: pointer;
            pointer-events: auto !important; 
            font-style: italic;
        }

        #footer {
            position: fixed;
            bottom: 15px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 0.6rem;
            z-index: 100;
            opacity: 0.5;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #loader-corazones {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 6rem;
            opacity: 0;
            z-index: 1000;
            filter: blur(2px) contrast(200%);
            letter-spacing: -5px;
            pointer-events: none;
        }

        @keyframes flicker {
            0%, 10%, 100% { opacity: 0.9; transform: translate(-50%, -50%) scale(1); }
            11% { opacity: 0.2; transform: translate(-51%, -49%) scale(1.05); }
            12% { opacity: 0.9; }
        }
        .flicker-active { animation: flicker 0.8s infinite; }

        .zona-click { position: fixed; top: 0; height: 100%; width: 50%; z-index: 10; cursor: pointer; display: none; }
        .izq { left: 0; } .der { right: 0; }
    </style>
</head>
