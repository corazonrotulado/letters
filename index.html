<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>corazón rotulado</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        
        body, html { 
            margin: 0; padding: 0; 
            height: 100%; width: 100%; 
            font-family: 'Playfair Display', serif;
            overflow: hidden; 
            transition: background-color 1.5s ease, color 1.5s ease;
            background-color: #fce4ec;
            color: #ad1457;
            user-select: none; 
            -webkit-user-select: none;
        }

        body::after {
            content: "";
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
            opacity: 0.1;
            z-index: 999;
            pointer-events: none;
            animation: grain-jump 0.6s steps(8) infinite;
        }

        @keyframes grain-jump {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-1%, -2%); }
            50% { transform: translate(-3%, 1%); }
        }

        #contenedor-imagen {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 85%; height: 85%;
            z-index: 1;
            opacity: 0;
            transition: opacity 1.5s ease;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            mix-blend-mode: screen; 
            filter: contrast(1.5) brightness(0.8) sepia(1) saturate(5);
        }

        #viewport-texto {
            position: fixed;
            top: 12vh;
            left: 50%;
            transform: translateX(-50%);
            width: 90%; 
            max-width: 500px;
            height: 70vh;
            z-index: 50; 
            overflow-y: auto; 
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
            mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
            -webkit-overflow-scrolling: touch;
        }

        #viewport-texto::-webkit-scrollbar { display: none; }

        #menu-cartas {
            display: none;
            flex-direction: column;
            gap: 4px; 
            padding: 80px 10px; 
            width: 100%;
            opacity: 0;
            transition: opacity 1s ease;
            flex-shrink: 0;
        }

        .boton-carta {
            padding: 6px 0; 
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: baseline;
        }

        .boton-carta span.numero {
            font-size: 0.8rem;
            margin-right: 15px;
            opacity: 0.5;
        }

        #contenedor-texto { 
            position: absolute;
            width: 100%;
            text-align: left;
            font-size: 1.4rem; 
            line-height: 2.3; 
            opacity: 0;
            padding: 40px 25px;
            color: inherit;
            pointer-events: none;
            /* Evitamos que el texto sea visible antes de la animación */
            transform: translateY(100vh);
        }

        .bienvenida {
            position: absolute !important;
            top: 50% !important;
            left: 0;
            transform: translateY(-50%) !important;
            text-align: center !important;
            width: 100% !important;
            opacity: 1 !important;
            cursor: pointer;
            pointer-events: auto !important; 
        }

        #footer {
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 0.65rem;
            z-index: 100;
            opacity: 0.7;
        }

        .zona-click { position: fixed; top: 0; height: 100%; width: 50%; z-index: 10; cursor: pointer; display: none; }
        .izq { left: 0; } .der { right: 0; }

        #loader-corazones {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            opacity: 0;
            z-index: 1000;
            transition: opacity 0.5s ease;
            filter: blur(1px);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="contenedor-imagen"></div>

    <div id="controles-navegacion">
        <div id="zona-regresar" class="zona-click izq" onclick="regresarAlMenu()"></div>
        <div id="zona-siguiente" class="zona-click der" onmousedown="pausar()" onmouseup="reanudar(1)"></div>
    </div>

    <div id="viewport-texto">
        <div id="loader-corazones">♥♥♥</div>
        <div id="menu-cartas"></div>
        <div id="contenedor-texto" class="bienvenida" onclick="iniciarDesdeBienvenida()">todas mis palabras yacen aquí, <br> ¡sé gentil con ellas, por favor!</div>
    </div>

    <footer id="footer">
        this page is the lovechild of <a href="https://thesoundof.love" target="_blank" style="color:inherit">sound of love</a> and son of spergy<br>
        ¿tienes un mensaje para mí? <a href="https://secreto.site/antzz7" target="_blank" style="color:inherit">aquí</a>, por favor
    </footer>

    <script>
        const S_ID = "1kDWsxPSkUCAYrhr2dUG1gujmiSGo2Crcf36D4TB75js"; 
        let datosCartas = [];
        let indiceActual = -1;
        let animacionActual = null;
        let msPresionado = 0;
        let datosListos = false;

        const combinaciones = [
            { bg: "#fce4ec", txt: "#ad1457" }, 
            { bg: "#e8eaf6", txt: "#283593" }, 
            { bg: "#e0f2f1", txt: "#00695c" }, 
            { bg: "#f1f8e9", txt: "#33691e" }, 
            { bg: "#fff3e0", txt: "#e65100" }
        ];

        async function cargarCartas() {
            const url = `https://docs.google.com/spreadsheets/d/${S_ID}/gviz/tq?tqx=out:json`;
            try {
                const res = await fetch(url);
                const t = await res.text();
                const json = JSON.parse(t.substr(47).slice(0, -2));
                datosCartas = json.table.rows.map(row => ({
                    texto: row.c[0] ? row.c[0].v : "",
                    img: (row.c[1] && row.c[1].v) ? row.c[1].v : null,
                    titulo: (row.c[2] && row.c[2].v) ? row.c[2].v : "Sin título"
                }));
                datosListos = true;
            } catch (e) { console.error("Error Sheets"); }
        }

        function iniciarDesdeBienvenida() { if (datosListos) secuenciaEntrada(); }

        function secuenciaEntrada() {
            const bienvenidaEl = document.getElementById('contenedor-texto');
            const loader = document.getElementById('loader-corazones');
            bienvenidaEl.style.opacity = 0;
            setTimeout(() => {
                bienvenidaEl.style.display = 'none';
                loader.style.opacity = 0.8;
                setTimeout(() => { 
                    loader.style.opacity = 0; 
                    setTimeout(generarMenu, 500);
                }, 1200);
            }, 500);
        }

        function generarMenu() {
            const menuEl = document.getElementById('menu-cartas');
            const viewport = document.getElementById('viewport-texto');
            document.querySelectorAll('.zona-click').forEach(el => el.style.display = 'none');
            
            viewport.style.webkitMaskImage = "linear-gradient(to bottom, transparent, black 15%, black 85%, transparent)";
            viewport.style.maskImage = "linear-gradient(to bottom, transparent, black 15%, black 85%, transparent)";
            viewport.scrollTop = 0;

            menuEl.innerHTML = ""; 
            menuEl.style.display = 'flex';
            datosCartas.forEach((carta, i) => {
                const btn = document.createElement('div');
                btn.className = 'boton-carta';
                btn.innerHTML = `<span class="numero">${(i + 1).toString().padStart(2, '0')}</span> ${carta.titulo}`;
                btn.onclick = (e) => { e.stopPropagation(); seleccionarCarta(i); };
                menuEl.appendChild(btn);
            });
            setTimeout(() => menuEl.style.opacity = 1, 50);
        }

        function seleccionarCarta(index) {
            indiceActual = index;
            document.getElementById('menu-cartas').style.opacity = 0;
            setTimeout(() => {
                document.getElementById('menu-cartas').style.display = 'none';
                cambiarCarta(0); 
            }, 500);
        }

        function regresarAlMenu() {
            if (animacionActual) animacionActual.cancel();
            const loader = document.getElementById('loader-corazones');
            document.getElementById('contenedor-texto').style.opacity = 0;
            document.getElementById('contenedor-imagen').style.opacity = 0;
            loader.style.opacity = 0.8;
            setTimeout(() => {
                loader.style.opacity = 0;
                setTimeout(generarMenu, 400);
            }, 1000);
        }

        function pausar() { if (animacionActual) animacionActual.pause(); msPresionado = Date.now(); }
        
        function reanudar(dir) {
            if ((Date.now() - msPresionado) < 250) cambiarCarta(dir);
            else if (animacionActual) animacionActual.play();
        }

        function cambiarCarta(dir) {
            const textoEl = document.getElementById('contenedor-texto');
            const viewport = document.getElementById('viewport-texto');
            const contImg = document.getElementById('contenedor-imagen');
            const loader = document.getElementById('loader-corazones');
            const zonas = document.querySelectorAll('.zona-click');

            if (animacionActual) animacionActual.cancel();
            
            // Limpieza inmediata
            textoEl.style.opacity = 0;
            textoEl.style.position = "absolute";
            textoEl.style.pointerEvents = "none";
            contImg.style.opacity = 0;
            viewport.scrollTop = 0;

            // Mostrar loader ANTES de preparar la carta
            loader.style.opacity = 0.8;

            setTimeout(() => {
                // Preparar contenido mientras el loader brilla
                const combo = combinaciones[Math.floor(Math.random() * combinaciones.length)];
                document.body.style.backgroundColor = combo.bg;
                document.body.style.color = combo.txt;

                if (dir !== 0 || indiceActual === -1) {
                    indiceActual = (indiceActual + dir + datosCartas.length) % datosCartas.length;
                }
                
                const carta = datosCartas[indiceActual];
                textoEl.innerText = carta.texto;
                textoEl.style.display = 'block';
                
                if (carta.img) {
                    contImg.style.backgroundImage = `url('${carta.img}')`;
                }

                // Esperar a que el loader se apague para iniciar el movimiento
                setTimeout(() => {
                    loader.style.opacity = 0;
                    
                    setTimeout(() => {
                        zonas.forEach(z => { z.style.display = 'block'; z.style.zIndex = "60"; });
                        if (carta.img) contImg.style.opacity = 0.4;
                        textoEl.style.opacity = 1;

                        const duracion = ((textoEl.offsetHeight + viewport.offsetHeight) / 45) * 1000;

                        animacionActual = textoEl.animate([
                            { transform: `translateY(${viewport.offsetHeight}px)` }, 
                            { transform: `translateY(-${textoEl.offsetHeight}px)` }
                        ], { duration: duracion, easing: 'linear' });

                        animacionActual.onfinish = () => {
                            textoEl.style.position = "relative";
                            textoEl.style.transform = "none";
                            textoEl.style.pointerEvents = "auto";
                            viewport.style.webkitMaskImage = "none";
                            zonas.forEach(z => z.style.zIndex = "10");
                        };
                    }, 400); // Pequeña pausa dramática tras el loader
                }, 1000);
            }, 400);
        }

        cargarCartas();
    </script>
</body>
</html>
