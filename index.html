<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>corazón rotulado</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        /* RESET GENERAL */
        * { box-sizing: border-box; }
        
        body, html { 
            margin: 0; padding: 0; 
            height: 100%; width: 100%; 
            font-family: 'Playfair Display', serif;
            overflow: hidden; 
            /* Transición más rápida para que se note el cambio de color */
            transition: background-color 0.8s ease, color 0.8s ease;
            background-color: #0a0a0a; /* Fondo inicial NEGRO */
            color: #39ff14; /* Texto inicial VERDE NEÓN */
            user-select: none; 
            -webkit-user-select: none;
        }

        /* TEXTURA DE GRANO */
        body::after {
            content: "";
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
            opacity: 0.15;
            z-index: 999;
            pointer-events: none;
            animation: grain-jump 0.6s steps(8) infinite;
        }

        @keyframes grain-jump {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-1%, -2%); }
            50% { transform: translate(-3%, 1%); }
        }

        #contenedor-imagen {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 85%; height: 85%;
            z-index: 1;
            opacity: 0;
            transition: opacity 1s ease;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            mix-blend-mode: screen; 
            /* Quitamos el SEPIA para que no se vea rosa/naranja */
            filter: contrast(1.2) brightness(1.1) saturate(1.5);
        }

        #viewport-texto {
            position: fixed;
            top: 12vh;
            left: 50%;
            transform: translateX(-50%);
            width: 90%; 
            max-width: 500px;
            height: 70vh;
            z-index: 5;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
            mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
            scroll-behavior: smooth;
        }

        #viewport-texto::-webkit-scrollbar { display: none; }

        #menu-cartas {
            display: none;
            flex-direction: column;
            gap: 4px;
            padding: 80px 10px;
            width: 100%;
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 20;
        }

        .boton-carta {
            padding: 12px 0;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.2s ease;
            text-align: left;
            display: flex;
            align-items: baseline;
            pointer-events: auto;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .boton-carta:hover {
            opacity: 1;
            padding-left: 15px;
            background: rgba(255, 255, 255, 0.08);
        }

        #contenedor-texto { 
            position: absolute;
            width: 100%;
            text-align: left;
            font-size: 1.4rem; 
            line-height: 2.3; 
            opacity: 0;
            padding: 20px 25px;
            color: inherit;
            pointer-events: none;
        }

        .bienvenida {
            position: absolute !important;
            top: 50% !important;
            transform: translateY(-50%) !important;
            text-align: center !important;
            width: 100% !important;
            opacity: 1 !important;
            cursor: pointer;
            pointer-events: auto !important; 
        }

        #footer {
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 0.65rem;
            z-index: 100;
            opacity: 0.6;
            transition: color 0.8s ease;
        }

        #footer a { color: inherit; text-decoration: underline; }

        #loader-corazones {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5rem;
            opacity: 0;
            z-index: 1000;
            transition: opacity 0.3s ease;
            filter: contrast(150%);
            letter-spacing: 15px;
            pointer-events: none;
        }

        /* EFECTO PARPADEO NEÓN */
        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 0.8; }
            20%, 24%, 55% { opacity: 0.1; }
        }
        .flicker-active { animation: flicker 1.5s infinite; }

        .zona-click { position: fixed; top: 0; height: 100%; width: 50%; z-index: 10; cursor: pointer; display: none; }
        .izq { left: 0; } .der { right: 0; }
    </style>
</head>
<body>

    <div id="contenedor-imagen"></div>

    <div id="controles-navegacion">
        <div id="zona-regresar" class="zona-click izq" onclick="regresarAlMenu()"></div>
        <div id="zona-siguiente" class="zona-click der" onmousedown="pausar()" onmouseup="reanudar(1)"></div>
    </div>

    <div id="viewport-texto">
        <div id="loader-corazones">♥♥♥</div>
        <div id="menu-cartas"></div>
        <div id="contenedor-texto" class="bienvenida" onclick="iniciarDesdeBienvenida()">todas mis palabras yacen aquí, <br> ¡sé gentil con ellas, por favor!</div>
    </div>

    <footer id="footer">
        this page is the lovechild of <a href="https://thesoundof.love" target="_blank">sound of love</a> and son of spergy<br>
        ¿tienes un mensaje para mí? <a href="https://www.facebook.com/profile.php?id=61585605616814" target="_blank">aquí</a>, por favor
    </footer>

    <script>
        const S_ID = "1kDWsxPSkUCAYrhr2dUG1gujmiSGo2Crcf36D4TB75js"; 
        let datosCartas = [];
        let indiceActual = -1;
        let animacionActual = null;
        let msPresionado = 0;
        let datosListos = false;

        // COMBINACIONES ESTILO 2008 (Oscuras + Neón)
        const combinaciones = [
            { bg: "#0d0d0d", txt: "#39ff14" }, // Verde Neón
            { bg: "#050505", txt: "#ff00ff" }, // Magenta/Rosa Fucsia
            { bg: "#111111", txt: "#00f3ff" }, // Cian Eléctrico
            { bg: "#0a0a0a", txt: "#ff073a" }, // Rojo Radical
            { bg: "#080808", txt: "#ccff00" }  // Lima Eléctrica
        ];

        async function cargarCartas() {
            const url = `https://docs.google.com/spreadsheets/d/${S_ID}/gviz/tq?tqx=out:json`;
            try {
                const res = await fetch(url);
                const t = await res.text();
                const json = JSON.parse(t.substr(47).slice(0, -2));
                datosCartas = json.table.rows.map(row => ({
                    texto: row.c[0] ? row.c[0].v : "",
                    img: (row.c[1] && row.c[1].v) ? row.c[1].v : null,
                    titulo: (row.c[2] && row.c[2].v) ? row.c[2].v : "Sin título"
                }));
                datosListos = true;
            } catch (e) { console.error("Error Sheets"); }
        }

        function iniciarDesdeBienvenida() {
            if (!datosListos) return;
            const bienvenidaEl = document.getElementById('contenedor-texto');
            const loader = document.getElementById('loader-corazones');
            
            bienvenidaEl.style.opacity = 0;
            bienvenidaEl.style.pointerEvents = 'none';

            setTimeout(() => {
                bienvenidaEl.style.display = 'none';
                loader.classList.add('flicker-active');
                loader.style.opacity = 0.8;
                setTimeout(() => {
                    loader.style.opacity = 0;
                    loader.classList.remove('flicker-active');
                    generarMenu();
                }, 1200);
            }, 500);
        }

        function generarMenu() {
            const menuEl = document.getElementById('menu-cartas');
            const contImg = document.getElementById('contenedor-imagen');
            const textoEl = document.getElementById('contenedor-texto');
            
            document.querySelectorAll('.zona-click').forEach(el => el.style.display = 'none');
            if (animacionActual) animacionActual.cancel();
            
            textoEl.style.opacity = 0;
            textoEl.style.display = 'none';
            contImg.style.opacity = 0;
            
            menuEl.innerHTML = ""; 
            menuEl.style.display = 'flex';
            
            datosCartas.forEach((carta, i) => {
                const btn = document.createElement('div');
                btn.className = 'boton-carta';
                btn.innerHTML = `<span class="numero">${(i + 1).toString().padStart(2, '0')}</span> ${carta.titulo}`;
                btn.onclick = (e) => { e.stopPropagation(); seleccionarCarta(i); };
                menuEl.appendChild(btn);
            });
            
            setTimeout(() => menuEl.style.opacity = 1, 50);
        }

        function regresarAlMenu() {
            const loader = document.getElementById('loader-corazones');
            const textoEl = document.getElementById('contenedor-texto');
            const contImg = document.getElementById('contenedor-imagen');
            
            if (animacionActual) animacionActual.cancel();
            textoEl.style.opacity = 0;
            contImg.style.opacity = 0;

            loader.classList.add('flicker-active');
            loader.style.opacity = 0.8;
            setTimeout(() => {
                loader.style.opacity = 0;
                loader.classList.remove('flicker-active');
                generarMenu();
            }, 800);
        }

        function seleccionarCarta(index) {
            indiceActual = index;
            document.getElementById('menu-cartas').style.opacity = 0;
            setTimeout(() => {
                document.getElementById('menu-cartas').style.display = 'none';
                document.querySelectorAll('.zona-click').forEach(el => el.style.display = 'block');
                cambiarCarta(0); 
            }, 300);
        }

        function pausar() { if (animacionActual) { animacionActual.pause(); msPresionado = Date.now(); } }

        function reanudar(dir) {
            if ((Date.now() - msPresionado) < 250) { cambiarCarta(dir); } 
            else if (animacionActual) { animacionActual.play(); }
        }

        function cambiarCarta(dir) {
            const textoEl = document.getElementById('contenedor-texto');
            const contImg = document.getElementById('contenedor-imagen');
            const loader = document.getElementById('loader-corazones');
            const viewport = document.getElementById('viewport-texto');

            if (animacionActual) animacionActual.cancel();
            
            textoEl.style.opacity = 0;
            contImg.style.opacity = 0;
            viewport.scrollTop = 0;

            setTimeout(() => {
                const combo = combinaciones[Math.floor(Math.random() * combinaciones.length)];
                document.body.style.backgroundColor = combo.bg;
                document.body.style.color = combo.txt;

                loader.style.color = combo.txt;
                loader.classList.add('flicker-active');
                loader.style.opacity = 0.8;

                setTimeout(() => {
                    loader.style.opacity = 0;
                    loader.classList.remove('flicker-active');

                    setTimeout(() => {
                        if (dir !== 0) { 
                            indiceActual = (indiceActual + dir + datosCartas.length) % datosCartas.length; 
                        }

                        const carta = datosCartas[indiceActual];
                        textoEl.innerText = carta.texto;
                        textoEl.classList.remove('bienvenida');
                        textoEl.style.display = 'block';
                        textoEl.style.position = "absolute";

                        if (carta.img) {
                            contImg.style.backgroundImage = `url('${carta.img}')`;
                            contImg.style.opacity = 0.6; 
                        }

                        textoEl.style.opacity = 1;
                        const alturaTexto = textoEl.offsetHeight || 500; 
                        const pixelesPorSegundo = 55; 
                        const duracionDinamica = ((alturaTexto + window.innerHeight) / pixelesPorSegundo) * 1000;

                        animacionActual = textoEl.animate([
                            { transform: 'translateY(70vh)' }, 
                            { transform: 'translateY(-130%)' }
                        ], { duration: duracionDinamica, iterations: 1, easing: 'linear' });

                        animacionActual.onfinish = () => {
                            textoEl.style.position = "relative";
                            textoEl.style.transform = "none";
                        };
                    }, 300);
                }, 1000);
            }, 400);
        }

        cargarCartas();
    </script>
</body>
</html>
