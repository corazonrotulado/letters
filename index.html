<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>corazón rotulado</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        
        body, html { 
            margin: 0; padding: 0; 
            height: 100%; width: 100%; 
            font-family: 'Playfair Display', serif;
            overflow: hidden; 
            transition: background-color 1.5s ease, color 1.5s ease;
            background-color: #fce4ec;
            color: #ad1457;
            user-select: none; 
            -webkit-user-select: none;
        }

        body::after {
            content: "";
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
            opacity: 0.1;
            z-index: 999;
            pointer-events: none;
            animation: grain-jump 0.6s steps(8) infinite;
        }

        @keyframes grain-jump {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-1%, -2%); }
            50% { transform: translate(-3%, 1%); }
        }

        #contenedor-imagen {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 85%; height: 85%;
            z-index: 1;
            opacity: 0;
            transition: opacity 1.5s ease;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            mix-blend-mode: screen; 
            filter: contrast(1.5) brightness(0.8) sepia(1) saturate(5);
        }

        #viewport-texto {
            position: fixed;
            top: 12vh;
            left: 50%;
            transform: translateX(-50%);
            width: 90%; 
            max-width: 500px;
            height: 70vh; 
            z-index: 5;
            overflow-y: auto; 
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
            mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
            scroll-behavior: smooth;
        }

        #viewport-texto::-webkit-scrollbar { display: none; }

        #menu-cartas {
            display: none;
            flex-direction: column;
            gap: 4px;
            padding: 80px 10px; 
            width: 100%;
            opacity: 0;
            transition: opacity 1s ease;
            z-index: 20;
            flex-shrink: 0;
        }

        .boton-carta {
            padding: 12px 0;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            text-align: left;
            display: flex;
            align-items: baseline;
            pointer-events: auto;
        }

        .boton-carta span.numero {
            font-size: 0.8rem;
            margin-right: 15px;
            opacity: 0.5;
        }

        .boton-carta:hover {
            opacity: 0.6;
            padding-left: 8px;
        }

        #contenedor-texto { 
            position: absolute;
            width: 100%;
            text-align: left;
            font-size: 1.4rem; 
            line-height: 2.3; 
            opacity: 0;
            padding: 20px 25px;
            color: inherit;
            pointer-events: none;
        }

        .bienvenida {
            position: absolute !important;
            top: 50% !important;
            transform: translateY(-50%) !important;
            text-align: center !important;
            width: 100% !important;
            opacity: 1 !important;
            cursor: pointer;
            pointer-events: auto !important; 
        }

        #footer {
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 0.65rem;
            letter-spacing: 0.3px;
            z-index: 100;
            opacity: 0.7;
            line-height: 1.6;
            transition: color 1.5s ease;
        }

        #footer a {
            color: inherit;
            text-decoration: none;
            border-bottom: 0.3px solid currentColor;
            transition: opacity 0.3s ease;
        }

        #footer a:hover { opacity: 0.5; }

        #loader-corazones {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5rem;
            opacity: 0;
            z-index: 1000;
            transition: opacity 0.4s ease, color 1.5s ease;
            filter: blur(2px) contrast(180%);
            letter-spacing: 15px;
            pointer-events: none;
        }

        .zona-click { position: fixed; top: 0; height: 100%; width: 50%; z-index: 10; cursor: pointer; display: none; }
        .izq { left: 0; } .der { right: 0; }

        /* EFECTO PALABRAS VOLADORAS */
        #contenedor-vuelo {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999; /* Muy alto para que se vea siempre */
            overflow: hidden;
            display: none;
        }

        .palabra-voladora {
            position: absolute;
            white-space: nowrap;
            font-size: 1.8rem; /* Un poco más grande para que se note */
            font-style: italic;
            opacity: 0.9;
            color: inherit;
            animation: volar-izquierda linear forwards;
        }

        @keyframes volar-izquierda {
            from { transform: translateX(110vw); }
            to { transform: translateX(-150%); }
        }
    </style>
</head>
<body>

    <div id="contenedor-imagen"></div>
    <div id="contenedor-vuelo"></div>

    <div id="controles-navegacion">
        <div id="zona-regresar" class="zona-click izq" onclick="regresarAlMenu()"></div>
        <div id="zona-siguiente" class="zona-click der" onmousedown="pausar()" onmouseup="reanudar(1)"></div>
    </div>

    <div id="viewport-texto">
        <div id="loader-corazones">♥♥♥</div>
        <div id="menu-cartas"></div>
        <div id="contenedor-texto" class="bienvenida" onclick="iniciarDesdeBienvenida()">todas mis palabras yacen aquí, <br> ¡sé gentil con ellas, por favor!</div>
    </div>

    <footer id="footer">
        this page is the lovechild of <a href="https://thesoundof.love" target="_blank">sound of love</a> and son of spergy<br>
        ¿tienes un mensaje para mí? <a href="https://secreto.site/antzz7" target="_blank">aquí</a>, por favor
    </footer>

    <script>
        const S_ID = "1kDWsxPSkUCAYrhr2dUG1gujmiSGo2Crcf36D4TB75js"; 
        let datosCartas = [];
        let indiceActual = -1;
        let interactuado = false;
        let animacionActual = null;
        let msPresionado = 0;
        let estaPausado = false;
        let datosListos = false;

        const combinaciones = [
            { bg: "#fce4ec", txt: "#ad1457" }, 
            { bg: "#e8eaf6", txt: "#283593" }, 
            { bg: "#e0f2f1", txt: "#00695c" }, 
            { bg: "#f1f8e9", txt: "#33691e" }, 
            { bg: "#fff3e0", txt: "#e65100" }
        ];

        async function cargarCartas() {
            const url = `https://docs.google.com/spreadsheets/d/${S_ID}/gviz/tq?tqx=out:json`;
            try {
                const res = await fetch(url);
                const t = await res.text();
                const json = JSON.parse(t.substr(47).slice(0, -2));
                datosCartas = json.table.rows.map(row => {
                    // Mapeo manual para asegurar que lea la columna E (índice 4)
                    return {
                        texto: row.c[0] ? row.c[0].v : "",
                        img: (row.c[1] && row.c[1].v) ? row.c[1].v : null,
                        titulo: (row.c[2] && row.c[2].v) ? row.c[2].v : "Sin título",
                        vuelo: (row.c[4] && row.c[4].v) ? String(row.c[4].v) : null // Forzamos Columna E
                    };
                });
                datosListos = true;
            } catch (e) { console.error("Error Sheets"); }
        }

        function iniciarDesdeBienvenida() {
            if (!datosListos) return;
            secuenciaEntrada();
        }

        function secuenciaEntrada() {
            const bienvenidaEl = document.getElementById('contenedor-texto');
            const loader = document.getElementById('loader-corazones');
            bienvenidaEl.style.opacity = 0;
            bienvenidaEl.style.pointerEvents = 'none';
            setTimeout(() => {
                bienvenidaEl.style.display = 'none';
                loader.style.opacity = 0.6;
                setTimeout(() => {
                    loader.style.opacity = 0;
                    generarMenu();
                }, 1500);
            }, 800);
        }

        function generarMenu() {
            const menuEl = document.getElementById('menu-cartas');
            const contImg = document.getElementById('contenedor-imagen');
            const textoEl = document.getElementById('contenedor-texto');
            const viewport = document.getElementById('viewport-texto');
            const contVuelo = document.getElementById('contenedor-vuelo');
            
            document.querySelectorAll('.zona-click').forEach(el => el.style.display = 'none');
            if (animacionActual) animacionActual.cancel();
            if (contVuelo) { contVuelo.style.display = 'none'; contVuelo.innerHTML = ''; }
            
            interactuado = false;
            textoEl.style.opacity = 0;
            textoEl.style.display = 'none';
            contImg.style.opacity = 0;
            viewport.scrollTop = 0;
            menuEl.innerHTML = ""; 
            menuEl.style.display = 'flex';
            
            datosCartas.forEach((carta, i) => {
                const btn = document.createElement('div');
                btn.className = 'boton-carta';
                btn.innerHTML = `<span class="numero">${(i + 1).toString().padStart(2, '0')}</span> ${carta.titulo}`;
                btn.onclick = (e) => { e.stopPropagation(); seleccionarCarta(i); };
                menuEl.appendChild(btn);
            });
            setTimeout(() => menuEl.style.opacity = 1, 50);
        }

        function regresarAlMenu() {
            const loader = document.getElementById('loader-corazones');
            const textoEl = document.getElementById('contenedor-texto');
            const contImg = document.getElementById('contenedor-imagen');
            const contVuelo = document.getElementById('contenedor-vuelo');
            
            if (animacionActual) animacionActual.cancel();
            if (contVuelo) { contVuelo.style.display = 'none'; contVuelo.innerHTML = ''; }
            
            textoEl.style.opacity = 0;
            contImg.style.opacity = 0;
            loader.style.opacity = 0.6;
            setTimeout(() => {
                loader.style.opacity = 0;
                generarMenu();
            }, 1000);
        }

        function seleccionarCarta(index) {
            indiceActual = index;
            document.getElementById('menu-cartas').style.opacity = 0;
            setTimeout(() => {
                document.getElementById('menu-cartas').style.display = 'none';
                document.querySelectorAll('.zona-click').forEach(el => el.style.display = 'block');
                cambiarCarta(0); 
            }, 500);
        }

        function pausar() {
            if (animacionActual) { animacionActual.pause(); estaPausado = true; msPresionado = Date.now(); }
        }

        function reanudar(dir) {
            if ((Date.now() - msPresionado) < 250) { cambiarCarta(dir); } 
            else if (animacionActual) { animacionActual.play(); }
            estaPausado = false;
        }

        function lanzarVuelo(frasesString) {
            const contVuelo = document.getElementById('contenedor-vuelo');
            contVuelo.style.display = 'block';
            contVuelo.innerHTML = '';
            
            // Dividimos por comas
            const frases = frasesString.split(',').map(f => f.trim()).filter(f => f !== "");
            
            frases.forEach((frase, i) => {
                setTimeout(() => {
                    const span = document.createElement('span');
                    span.className = 'palabra-voladora';
                    span.innerText = frase;
                    // Distribución en pantalla
                    span.style.top = (Math.random() * 75 + 10) + "vh";
                    const duracion = Math.random() * 3 + 5; // 5 a 8 segundos
                    span.style.animationDuration = duracion + "s";
                    contVuelo.appendChild(span);
                    
                    setTimeout(() => span.remove(), duracion * 1000);
                }, i * 600); // Salen con delay
            });
        }

        function cambiarCarta(dir) {
            const textoEl = document.getElementById('contenedor-texto');
            const contImg = document.getElementById('contenedor-imagen');
            const loader = document.getElementById('loader-corazones');
            const viewport = document.getElementById('viewport-texto');
            const contVuelo = document.getElementById('contenedor-vuelo');

            if (animacionActual) animacionActual.cancel();
            if (contVuelo) { contVuelo.style.display = 'none'; contVuelo.innerHTML = ''; }
            
            textoEl.style.opacity = 0;
            contImg.style.opacity = 0;
            viewport.scrollTop = 0;

            setTimeout(() => {
                const combo = combinaciones[Math.floor(Math.random() * combinaciones.length)];
                document.body.style.backgroundColor = combo.bg;
                document.body.style.color = combo.txt;

                textoEl.innerText = "";
                textoEl.classList.remove('bienvenida');
                textoEl.style.display = 'block';
                textoEl.style.position = "absolute";
                loader.style.opacity = 0.6;

                setTimeout(() => {
                    loader.style.opacity = 0;
                    if (dir !== 0) { 
                        indiceActual = (indiceActual + dir + datosCartas.length) % datosCartas.length; 
                    }

                    const carta = datosCartas[indiceActual];
                    
                    // Verificación de título (Ignora mayúsculas/minúsculas)
                    const esCorazonRotulado = carta.titulo.toLowerCase().trim() === "corazón rotulado";

                    if (esCorazonRotulado) {
                        textoEl.innerText = ""; 
                        if (carta.vuelo) {
                            lanzarVuelo(carta.vuelo);
                        }
                    } else {
                        textoEl.innerText = carta.texto;
                    }

                    if (carta.img) {
                        contImg.style.backgroundImage = `url('${carta.img}')`;
                        contImg.style.opacity = 0.5; 
                    }

                    textoEl.style.opacity = 1;
                    interactuado = true;

                    const alturaTexto = textoEl.offsetHeight || 500; 
                    const pixelesPorSegundo = 50; 
                    const duracionDinamica = ((alturaTexto + window.innerHeight) / pixelesPorSegundo) * 1200;

                    animacionActual = textoEl.animate([
                        { transform: 'translateY(60vh)' }, 
                        { transform: 'translateY(-120%)' }
                    ], { 
                        duration: duracionDinamica, 
                        iterations: 1, 
                        easing: 'linear' 
                    });

                    animacionActual.onfinish = () => {
                        textoEl.style.position = "relative";
                        textoEl.style.transform = "none";
                    };
                }, 1500);
            }, 600);
        }

        cargarCartas();
    </script>
</body>
</html>
