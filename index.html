<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>corazón rotulado</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            font-family: 'Playfair Display', serif; overflow: hidden; 
            background-color: #fce4ec; color: #ad1457;
            transition: background-color 1.2s ease, color 1.2s ease;
            user-select: none; -webkit-user-select: none;
        }

        body::after {
            content: ""; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
            opacity: 0.1; z-index: 999; pointer-events: none;
        }

        #viewport-texto {
            position: fixed; top: 12vh; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 500px; height: 70vh; z-index: 5;
            display: flex; flex-direction: column; overflow: hidden;
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
            mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
        }

        #contenedor-texto { 
            position: absolute; width: 100%; text-align: left; font-size: 1.4rem; 
            line-height: 2.3; opacity: 0; padding: 20px 25px; pointer-events: none;
            white-space: pre-wrap;
            transform: translateY(70vh);
        }

        .bienvenida {
            position: absolute !important; top: 50% !important; transform: translateY(-50%) !important;
            text-align: center !important; opacity: 1 !important; cursor: pointer; pointer-events: auto !important; 
        }

        #loader-corazones {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 5rem; opacity: 0; z-index: 1000;
            transition: opacity 0.4s ease; filter: blur(2px) contrast(180%);
            letter-spacing: 15px; pointer-events: none;
        }

        #contenedor-vuelo {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1000; overflow: hidden; display: none;
        }
        .palabra-voladora {
            position: absolute; white-space: nowrap; font-size: 1.8rem; font-style: italic;
            opacity: 0.9; color: inherit; animation: volar-izq linear forwards;
            text-shadow: 0 0 15px rgba(255,255,255,0.4);
        }
        @keyframes volar-izq {
            from { transform: translateX(115vw); }
            to { transform: translateX(-160%); }
        }

        #menu-cartas { display: none; flex-direction: column; gap: 5px; padding: 80px 15px; width: 100%; z-index: 20; overflow-y: auto; opacity: 0; transition: opacity 1s ease; }
        #menu-cartas::-webkit-scrollbar { display: none; }
        
        .boton-carta { padding: 15px 0; cursor: pointer; font-size: 1.1rem; text-align: left; opacity: 0.6; transition: 0.3s ease; }
        .boton-carta:hover { opacity: 1; padding-left: 10px; }

        .zona-click { position: fixed; top: 0; height: 100%; width: 50%; z-index: 10; cursor: pointer; display: none; }
        .izq { left: 0; } .der { right: 0; }
    </style>
</head>
<body>

    <div id="contenedor-vuelo"></div>
    <div id="loader-corazones">♥♥♥</div>

    <div id="controles-navegacion">
        <div class="zona-click izq" onclick="regresarAlMenu()"></div>
        <div class="zona-click der" onclick="cambiarCarta(1)"></div>
    </div>

    <div id="viewport-texto">
        <div id="menu-cartas"></div>
        <div id="contenedor-texto" class="bienvenida" onclick="iniciarDesdeBienvenida()">todas mis palabras yacen aquí, <br> ¡sé gentil con ellas, por favor!</div>
    </div>

    <script>
        const S_ID = "1kDWsxPSkUCAYrhr2dUG1gujmiSGo2Crcf36D4TB75js"; 
        let datosCartas = [];
        let indiceActual = -1;
        let animacionActual = null;

        // Paleta de colores más variada
        const combinaciones = [
            { bg: "#fce4ec", txt: "#ad1457" }, // Rosa
            { bg: "#e8eaf6", txt: "#1a237e" }, // Azul noche
            { bg: "#e0f2f1", txt: "#004d40" }, // Verde agua
            { bg: "#fff3e0", txt: "#e65100" }, // Naranja
            { bg: "#f3e5f5", txt: "#4a148c" }, // Violeta
            { bg: "#efebe9", txt: "#3e2723" }, // Café arena
            { bg: "#e1f5fe", txt: "#01579b" }, // Celeste
            { bg: "#f9fbe7", txt: "#33691e" }  // Lima suave
        ];

        async function cargar() {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${S_ID}/gviz/tq?tqx=out:json`;
                const res = await fetch(url);
                const t = await res.text();
                const json = JSON.parse(t.substr(47).slice(0, -2));
                datosCartas = json.table.rows.map(row => ({
                    texto: row.c[0] ? String(row.c[0].v) : "",
                    titulo: row.c[2] ? String(row.c[2].v) : "Sin título"
                }));
            } catch (e) { console.error("Error Sheets"); }
        }

        function iniciarDesdeBienvenida() {
            const bienvenida = document.getElementById('contenedor-texto');
            const loader = document.getElementById('loader-corazones');
            bienvenida.style.opacity = 0;
            setTimeout(() => {
                bienvenida.style.display = 'none';
                loader.style.opacity = 0.6;
                setTimeout(() => {
                    loader.style.opacity = 0;
                    mostrarMenu();
                }, 1000);
            }, 400);
        }

        function mostrarMenu() {
            const menu = document.getElementById('menu-cartas');
            menu.style.display = 'flex';
            menu.innerHTML = "";
            document.querySelectorAll('.zona-click').forEach(z => z.style.display = 'none');
            
            datosCartas.forEach((c, i) => {
                const btn = document.createElement('div');
                btn.className = 'boton-carta';
                btn.innerHTML = `<span style="opacity:0.3; font-size:0.8rem; margin-right:12px">${(i+1).toString().padStart(2,'0')}</span> ${c.titulo}`;
                btn.onclick = () => {
                    indiceActual = i;
                    menu.style.opacity = 0;
                    setTimeout(() => {
                        menu.style.display = 'none';
                        document.querySelectorAll('.zona-click').forEach(z => z.style.display = 'block');
                        cambiarCarta(0);
                    }, 400);
                };
                menu.appendChild(btn);
            });
            setTimeout(() => menu.style.opacity = 1, 50);
        }

        function lanzarVuelo(frase) {
            const cont = document.getElementById('contenedor-vuelo');
            cont.style.display = 'block';
            cont.innerHTML = '';
            const trozos = frase.split('-').map(p => p.trim()).filter(p => p !== "");
            trozos.forEach((p, i) => {
                setTimeout(() => {
                    const span = document.createElement('span');
                    span.className = 'palabra-voladora';
                    span.innerText = p;
                    span.style.top = (Math.random() * 65 + 10) + "vh";
                    const d = Math.random() * 3 + 6;
                    span.style.animationDuration = d + "s";
                    cont.appendChild(span);
                    setTimeout(() => span.remove(), d * 1000);
                }, i * 850);
            });
        }

        function cambiarCarta(dir) {
            if (animacionActual) animacionActual.cancel();
            const txtEl = document.getElementById('contenedor-texto');
            const loader = document.getElementById('loader-corazones');
            const contVuelo = document.getElementById('contenedor-vuelo');
            
            txtEl.style.opacity = 0;
            txtEl.style.transform = "translateY(70vh)"; // Reset posición
            contVuelo.style.display = 'none';
            loader.style.opacity = 0.6;

            setTimeout(() => {
                loader.style.opacity = 0;
                
                // Cambio de color más notable
                const combo = combinaciones[Math.floor(Math.random() * combinaciones.length)];
                document.body.style.backgroundColor = combo.bg;
                document.body.style.color = combo.txt;

                indiceActual = (indiceActual + dir + datosCartas.length) % datosCartas.length;
                const carta = datosCartas[indiceActual];
                const tituloID = carta.titulo.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();

                if (tituloID === "corazon rotulado") {
                    txtEl.innerText = "";
                    lanzarVuelo(carta.texto);
                } else {
                    txtEl.innerText = carta.texto;
                    txtEl.style.opacity = 1;
                    
                    // Cálculo de duración
                    const dur = ((txtEl.offsetHeight + window.innerHeight) / 45) * 1000;
                    animacionActual = txtEl.animate([
                        { transform: 'translateY(70vh)' }, 
                        { transform: 'translateY(-130%)' }
                    ], { 
                        duration: Math.max(dur, 9000), 
                        iterations: 1, 
                        easing: 'linear' 
                    });
                }
            }, 800);
        }

        function regresarAlMenu() {
            if (animacionActual) animacionActual.cancel();
            const loader = document.getElementById('loader-corazones');
            const txtEl = document.getElementById('contenedor-texto');
            txtEl.style.opacity = 0;
            document.getElementById('contenedor-vuelo').style.display = 'none';
            loader.style.opacity = 0.6;
            setTimeout(() => {
                loader.style.opacity = 0;
                mostrarMenu();
            }, 800);
        }

        cargar();
    </script>
</body>
</html>
