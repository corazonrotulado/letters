<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>corazón rotulado</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            font-family: 'Playfair Display', serif; overflow: hidden; 
            background-color: #fce4ec; color: #ad1457;
            transition: background-color 2s ease;
        }

        body::after {
            content: ""; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
            opacity: 0.1; z-index: 999; pointer-events: none;
        }

        #viewport-texto {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center; z-index: 5;
        }

        #contenedor-texto { 
            width: 85%; max-width: 600px; text-align: center; font-size: 1.6rem; 
            line-height: 1.6; opacity: 0; pointer-events: none;
        }

        /* EFECTO DE APARICIÓN (FADE + SCALE + BLUR) */
        .frase-latido {
            position: absolute; width: 85%; left: 50%; top: 50%; transform: translate(-50%, -50%);
            opacity: 0; filter: blur(10px); text-align: center;
            animation: aparecer-latido 5s ease-in-out forwards;
        }

        @keyframes aparecer-latido {
            0% { opacity: 0; filter: blur(12px); transform: translate(-50%, -50%) scale(0.9); }
            20% { opacity: 1; filter: blur(0px); transform: translate(-50%, -50%) scale(1); }
            80% { opacity: 1; filter: blur(0px); transform: translate(-50%, -50%) scale(1.05); }
            100% { opacity: 0; filter: blur(15px); transform: translate(-50%, -50%) scale(1.1); }
        }

        .bienvenida {
            opacity: 1 !important; cursor: pointer; pointer-events: auto !important; font-size: 1.4rem;
        }

        #menu-cartas { 
            display: none; flex-direction: column; gap: 5px; padding: 80px 20px; 
            width: 100%; height: 100%; overflow-y: auto; z-index: 20; 
        }
        .boton-carta { padding: 18px 0; cursor: pointer; font-size: 1.1rem; border-bottom: 0.5px solid rgba(173, 20, 87, 0.1); }
        
        .zona-click { position: fixed; top: 0; height: 100%; width: 50%; z-index: 10; cursor: pointer; display: none; }
        .izq { left: 0; } .der { right: 0; }
    </style>
</head>
<body>

    <div id="controles-navegacion">
        <div class="zona-click izq" onclick="regresarAlMenu()"></div>
        <div class="zona-click der" onclick="cambiarCarta(1)"></div>
    </div>

    <div id="viewport-texto">
        <div id="menu-cartas"></div>
        <div id="contenedor-texto" class="bienvenida" onclick="iniciar()">todas mis palabras yacen aquí...</div>
    </div>

    <script>
        const S_ID = "1kDWsxPSkUCAYrhr2dUG1gujmiSGo2Crcf36D4TB75js"; 
        let datosCartas = [];
        let indiceActual = -1;
        let animacionActual = null;

        async function cargar() {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${S_ID}/gviz/tq?tqx=out:json`;
                const res = await fetch(url);
                const t = await res.text();
                const json = JSON.parse(t.substr(47).slice(0, -2));
                datosCartas = json.table.rows.map(row => ({
                    texto: row.c[0] ? String(row.c[0].v) : "",
                    titulo: row.c[2] ? String(row.c[2].v) : "Sin título"
                }));
            } catch (e) { console.error("Error cargando Excel"); }
        }

        function secuenciaFrases(textoCompleto) {
            const viewport = document.getElementById('viewport-texto');
            // Separamos por el guion y quitamos las comillas si las hay
            const frases = textoCompleto.split('-').map(f => f.trim().replace(/"/g, ""));
            
            document.body.style.backgroundColor = "#2d0a16"; // Fondo más íntimo
            document.body.style.color = "#fce4ec";

            frases.forEach((frase, i) => {
                setTimeout(() => {
                    const span = document.createElement('div');
                    span.className = 'frase-latido';
                    span.innerText = frase;
                    viewport.appendChild(span);
                    
                    // Borrar el elemento después de que termine la animación
                    setTimeout(() => span.remove(), 5000);
                }, i * 4500); // Aparecen una tras otra con un solapamiento suave
            });
        }

        function cambiarCarta(dir) {
            if (animacionActual) animacionActual.cancel();
            const txtEl = document.getElementById('contenedor-texto');
            const viewport = document.getElementById('viewport-texto');
            
            // Limpiar frases anteriores
            document.querySelectorAll('.frase-latido').forEach(f => f.remove());
            txtEl.style.opacity = 0;

            setTimeout(() => {
                indiceActual = (indiceActual + dir + datosCartas.length) % datosCartas.length;
                const carta = datosCartas[indiceActual];
                const tituloID = String(carta.titulo).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();

                if (tituloID === "corazon rotulado") {
                    txtEl.innerText = "";
                    secuenciaFrases(carta.texto);
                } else {
                    document.body.style.backgroundColor = "#fce4ec";
                    document.body.style.color = "#ad1457";
                    txtEl.innerText = carta.texto;
                    txtEl.style.opacity = 1;
                    const dur = ((txtEl.offsetHeight + window.innerHeight) / 50) * 1500;
                    animacionActual = txtEl.animate([{ transform: 'translateY(70vh)' }, { transform: 'translateY(-140%)' }], 
                        { duration: Math.max(dur, 8000), iterations: 1, easing: 'linear' });
                }
            }, 400);
        }

        function iniciar() {
            const m = document.getElementById('menu-cartas');
            const b = document.getElementById('contenedor-texto');
            b.style.display = 'none';
            m.style.display = 'flex';
            m.innerHTML = "";
            datosCartas.forEach((c, i) => {
                const btn = document.createElement('div');
                btn.className = 'boton-carta';
                btn.innerText = c.titulo;
                btn.onclick = () => {
                    indiceActual = i;
                    m.style.display = 'none';
                    document.querySelectorAll('.zona-click').forEach(z => z.style.display = 'block');
                    cambiarCarta(0);
                };
                m.appendChild(btn);
            });
        }

        function regresarAlMenu() { location.reload(); }

        cargar();
    </script>
</body>
</html>
